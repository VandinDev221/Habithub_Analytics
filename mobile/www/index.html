<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Habithub Analytics</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 2rem;
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        background: #3b82f6;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 1.5rem;
      }
      p { color: #94a3b8; line-height: 1.5; max-width: 280px; }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #334155;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-top: 1.5rem;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="logo">H</div>
    <h1>Habithub Analytics</h1>
    <p>Carregando… Verifique sua conexão com a internet.</p>
    <div class="spinner" aria-hidden="true"></div>
    <script>
      // Fallback se server.url do Capacitor não carregar (ex.: teste no browser)
      setTimeout(function () {
        window.location.href = 'https://habithub-analytics.vercel.app';
      }, 1500);
    </script>
  </body>
</html>
